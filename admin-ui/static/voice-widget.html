<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPPCOM Voicebot</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .widget {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.15);
            padding: 24px 20px 20px;
            width: 340px;
            display: flex;
            flex-direction: column;
            border: 1px solid #e8eaf0;
        }

        .logo { text-align: center; margin-bottom: 10px; }
        .logo img { height: 32px; }

        .title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 2px;
        }
        .subtitle {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-bottom: 14px;
        }

        /* ── Chat-Verlauf ── */
        .chat-history {
            background: #f5f7ff;
            border-radius: 12px;
            padding: 10px;
            height: 220px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            scroll-behavior: smooth;
        }
        .chat-history::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

        .bubble {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.45;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

        .bubble.bot {
            background: #1e3a8a;
            color: white;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }
        .bubble.user {
            background: #e5e7eb;
            color: #1f2937;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        /* ── Verarbeitungsanzeige ── */
        .processing-bar {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #92400e;
        }
        .processing-bar.active { display: flex; }

        .processing-dots span {
            display: inline-block;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #d97706;
            animation: blink 1.2s infinite;
        }
        .processing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .processing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

        .processing-timer {
            font-weight: 700;
            min-width: 28px;
            text-align: right;
        }

        /* ── Mic-Knopf ── */
        .mic-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .mic-btn {
            width: 64px; height: 64px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(59,130,246,0.4);
            flex-shrink: 0;
        }
        .mic-btn:hover { transform: scale(1.05); }
        .mic-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .mic-btn.listening {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            box-shadow: 0 4px 16px rgba(239,68,68,0.5);
            animation: pulse 1.5s infinite;
        }
        .mic-btn.speaking {
            background: linear-gradient(135deg, #059669, #10b981);
            box-shadow: 0 4px 16px rgba(16,185,129,0.5);
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 4px 16px rgba(239,68,68,0.5); }
            50% { box-shadow: 0 4px 30px rgba(239,68,68,0.8), 0 0 0 8px rgba(239,68,68,0.1); }
        }
        .mic-icon { width: 30px; height: 30px; fill: white; }

        .mic-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .mic-label { font-size: 13px; color: #374151; font-weight: 500; }
        .mic-sublabel { font-size: 11px; color: #9ca3af; }

        /* ── Waveform ── */
        .waveform {
            display: none;
            gap: 3px;
            align-items: center;
            height: 24px;
        }
        .waveform.active { display: flex; }
        .waveform span {
            display: inline-block;
            width: 3px;
            border-radius: 2px;
            background: #3b82f6;
            animation: wave 1s infinite ease-in-out;
        }
        .waveform.speaking span { background: #10b981; }
        .waveform span:nth-child(1) { animation-delay: 0s; }
        .waveform span:nth-child(2) { animation-delay: 0.1s; }
        .waveform span:nth-child(3) { animation-delay: 0.2s; }
        .waveform span:nth-child(4) { animation-delay: 0.1s; }
        .waveform span:nth-child(5) { animation-delay: 0s; }
        @keyframes wave { 0%,100%{height:6px} 50%{height:22px} }

        /* ── Beenden ── */
        .end-btn {
            background: none;
            border: 1px solid #e0e0e0;
            color: #888;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            display: none;
            align-self: center;
            margin-bottom: 6px;
        }
        .end-btn:hover { border-color: #dc2626; color: #dc2626; }
        .end-btn.visible { display: block; }

        .footer {
            margin-top: 8px;
            font-size: 11px;
            color: #bbb;
            text-align: center;
        }
        .footer a { color: #bbb; text-decoration: none; }

        #audioContainer { display: none; }
    </style>
</head>
<body>
    <div class="widget">
        <div class="logo">
            <img src="https://www.eppcom.de/assets/images/Logo.webp" alt="EPPCOM" onerror="this.style.display='none'">
        </div>
        <div class="title">Nexo – KI-Assistent</div>
        <div class="subtitle">Sprich mit Nexo über EPPCOM Solutions</div>

        <!-- Chat-Verlauf -->
        <div class="chat-history" id="chatHistory">
            <div class="bubble bot">Klick auf den Knopf und stell mir eine Frage!</div>
        </div>

        <!-- Verarbeitungsanzeige -->
        <div class="processing-bar" id="processingBar">
            <div class="processing-dots"><span></span><span></span><span></span></div>
            <span id="processingLabel">Nexo denkt nach…</span>
            <span class="processing-timer" id="processingTimer">0s</span>
        </div>

        <div class="mic-wrapper">
            <button class="mic-btn" id="micBtn" onclick="toggleCall()">
                <svg class="mic-icon" viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                </svg>
            </button>
            <div class="mic-info">
                <div class="mic-label" id="micLabel">Klicken zum Starten</div>
                <div class="waveform" id="waveform">
                    <span style="height:8px"></span>
                    <span style="height:14px"></span>
                    <span style="height:20px"></span>
                    <span style="height:14px"></span>
                    <span style="height:8px"></span>
                </div>
                <div class="mic-sublabel" id="micSublabel"></div>
            </div>
        </div>

        <button class="end-btn" id="endBtn" onclick="endCall()">Gespräch beenden</button>

        <div class="footer">
            Powered by <a href="https://www.eppcom.de" target="_blank">EPPCOM Solutions</a>
        </div>
    </div>

    <div id="audioContainer"></div>

    <script>
        const TOKEN_URL = 'https://appdb.eppcom.de/api/lk-token';
        const ROOM_NAME = 'eppcom-voice';
        const { Room, RoomEvent, Track } = LivekitClient;

        let room = null;
        let connected = false;
        let processingInterval = null;
        let processingStart = null;
        let waitingForResponse = false;  // true = Filler läuft, echter Timer weiterhin aktiv

        // ── Chat ──────────────────────────────────────────────
        function addBubble(text, who) {
            const history = document.getElementById('chatHistory');
            const el = document.createElement('div');
            el.className = 'bubble ' + who;
            el.textContent = text;
            history.appendChild(el);
            history.scrollTop = history.scrollHeight;
        }

        // ── Verarbeitungsanzeige ──────────────────────────────
        function startProcessing() {
            processingStart = Date.now();
            document.getElementById('processingTimer').textContent = '0s';
            document.getElementById('processingLabel').textContent = 'Nexo denkt nach…';
            document.getElementById('processingBar').classList.add('active');
            processingInterval = setInterval(() => {
                const s = Math.floor((Date.now() - processingStart) / 1000);
                document.getElementById('processingTimer').textContent = s + 's';
                // Label nach 3s wechseln (Filler abgeschlossen, LLM generiert)
                if (s >= 3) document.getElementById('processingLabel').textContent = 'Antwort wird generiert…';
            }, 500);
        }

        function stopProcessing() {
            clearInterval(processingInterval);
            processingInterval = null;
            document.getElementById('processingBar').classList.remove('active');
        }

        // ── Mic-Zustände ─────────────────────────────────────
        function setMicState(state) {
            const btn   = document.getElementById('micBtn');
            const label = document.getElementById('micLabel');
            const sub   = document.getElementById('micSublabel');
            const wave  = document.getElementById('waveform');
            const end   = document.getElementById('endBtn');

            btn.className = 'mic-btn';
            wave.className = 'waveform';
            sub.textContent = '';

            if (state === 'idle') {
                btn.disabled = false;
                label.textContent = 'Klicken zum Starten';
                end.className = 'end-btn';
                stopProcessing();
            } else if (state === 'connecting') {
                btn.disabled = true;
                label.textContent = 'Verbinde…';
            } else if (state === 'listening') {
                btn.disabled = false;
                btn.classList.add('listening');
                wave.classList.add('active');
                label.textContent = 'Höre zu…';
                sub.textContent = 'Sprich jetzt';
                end.classList.add('visible');
                stopProcessing();
            } else if (state === 'processing') {
                btn.disabled = false;
                label.textContent = 'Verarbeite…';
                sub.textContent = 'Bitte warten';
                end.classList.add('visible');
                startProcessing();
            } else if (state === 'speaking') {
                btn.disabled = false;
                btn.classList.add('speaking');
                wave.classList.add('active', 'speaking');
                label.textContent = 'Nexo antwortet';
                end.classList.add('visible');
                stopProcessing();
            } else if (state === 'ended') {
                btn.disabled = false;
                label.textContent = 'Klicken zum Starten';
                end.className = 'end-btn';
                stopProcessing();
            }
        }

        // ── Call-Steuerung ────────────────────────────────────
        async function toggleCall() {
            if (connected) { await endCall(); } else { await startCall(); }
        }

        async function startCall() {
            setMicState('connecting');

            try {
                const resp = await fetch(`${TOKEN_URL}?room=${encodeURIComponent(ROOM_NAME)}&user=widget-visitor`);
                if (!resp.ok) throw new Error('Token-Server HTTP ' + resp.status);
                const data = await resp.json();

                room = new Room({ adaptiveStream: false, dynacast: false });

                // Verbunden
                room.on(RoomEvent.Connected, () => {
                    connected = true;
                    setMicState('listening');
                });

                // Getrennt
                room.on(RoomEvent.Disconnected, () => {
                    connected = false;
                    setMicState('ended');
                    room = null;
                    document.getElementById('audioContainer').innerHTML = '';
                });

                // Agent-Audio startet
                room.on(RoomEvent.TrackSubscribed, (track) => {
                    if (track.kind !== Track.Kind.Audio) return;
                    const el = track.attach();
                    el.setAttribute('autoplay', '');
                    document.getElementById('audioContainer').appendChild(el);

                    // Filler-Phrase startet innerhalb ~2s nach Nutzereingabe.
                    // Timer weiterhin anzeigen bis echte Antwort kommt (>2s elapsed).
                    const elapsed = processingStart ? Date.now() - processingStart : 9999;
                    if (waitingForResponse && elapsed < 2500) {
                        // Filler läuft — Timer sichtbar lassen, nur Label anpassen
                        document.getElementById('processingLabel').textContent = 'Einen Moment…';
                    } else {
                        waitingForResponse = false;
                        setMicState('speaking');
                    }
                });

                // Agent-Audio endet
                room.on(RoomEvent.TrackUnsubscribed, (track) => {
                    track.detach().forEach(el => el.remove());
                    if (waitingForResponse) {
                        // Filler beendet — weiter im Processing-Zustand
                        document.getElementById('processingLabel').textContent = 'Antwort wird generiert…';
                    } else if (connected) {
                        setMicState('listening');
                    }
                });

                // User hat aufgehört zu sprechen → Verarbeitungsanzeige
                room.on(RoomEvent.ActiveSpeakersChanged, (speakers) => {
                    const userSpeaking = speakers.some(s => s.isLocal);
                    if (!userSpeaking && connected) {
                        setTimeout(() => {
                            if (connected && document.getElementById('micBtn').classList.contains('listening')) {
                                waitingForResponse = true;
                                setMicState('processing');
                            }
                        }, 300);
                    }
                });

                // Data-Nachrichten vom Agent (Transkripte + Status)
                room.on(RoomEvent.DataReceived, (payload) => {
                    try {
                        const msg = JSON.parse(new TextDecoder().decode(payload));
                        if (msg.type === 'user_speech' && msg.text) {
                            addBubble(msg.text, 'user');
                            setMicState('processing');
                        } else if (msg.type === 'agent_speech' && msg.text) {
                            addBubble(msg.text, 'bot');
                        }
                    } catch (_) {}
                });

                await room.connect(data.url || data.token && TOKEN_URL, data.token, { autoSubscribe: true });
                await room.localParticipant.setMicrophoneEnabled(true);

            } catch (e) {
                connected = false;
                setMicState('idle');
                addBubble('Verbindungsfehler: ' + e.message, 'bot');
                console.error(e);
            }
        }

        async function endCall() {
            if (room) await room.disconnect();
            connected = false;
            setMicState('idle');
            addBubble('Gespräch beendet. Bis bald!', 'bot');
        }
    </script>
</body>
</html>
